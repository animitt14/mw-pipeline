name: Rebuild Pipeline

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 8 AM ET Mon–Fri
    - cron: '0 16 * * 1-5'   # 12 PM ET Mon–Fri
    - cron: '0 20 * * 1-5'   # 4 PM ET Mon–Fri
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate pipeline HTML
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: python generate_pipeline.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "rebuild $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
